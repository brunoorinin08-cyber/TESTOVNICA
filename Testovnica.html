<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testovnica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .category-selection {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .category-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin: 5px;
            transition: background 0.3s;
        }
        
        .category-btn:hover {
            background: #764ba2;
        }
        
        .add-question-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin: 5px;
            transition: background 0.3s;
        }
        
        .add-question-btn:hover {
            background: #218838;
        }
        
        .add-question-form {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }
        
        .add-question-form h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .options-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .option-input {
            display: flex;
            align-items: center;
        }
        
        .option-input input[type="text"] {
            flex: 1;
            margin-right: 10px;
        }
        
        .correct-checkbox {
            margin-left: 10px;
        }
        
        .quiz-section {
            display: none;
        }
        
        .question {
            margin-bottom: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .question h2 {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 15px;
        }
        
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        label {
            display: flex;
            align-items: center;
            padding: 10px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        label:hover {
            background: #f0f0f0;
            border-color: #667eea;
        }
        
        label.correct {
            background: #d4edda;
            border-color: #28a745;
        }
        
        label.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
        }
        
        label.disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
        }
        
        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            display: none;
        }
        
        .feedback.correct {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .feedback.incorrect {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .confirm-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            margin-top: 10px;
            transition: background 0.3s;
        }
        
        .confirm-btn:hover {
            background: #218838;
        }
        
        .confirm-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 20px;
            width: 100%;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        .results {
            display: none;
            text-align: center;
            margin-top: 30px;
        }
        
        .score {
            font-size: 2em;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .back-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            margin-top: 10px;
            transition: background 0.3s;
        }
        
        .back-btn:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Testovnica</h1>
        
        <div class="category-selection" id="categorySelection">
            <h2>Vyber kategóriu alebo pridaj otázku:</h2>
            <button class="category-btn" onclick="selectCategory('Termodynamika')">Termodynamika</button>
            <button class="category-btn" onclick="selectCategory('Neviem čo')">Neviem čo</button>
            <br>
            <button class="add-question-btn" onclick="showAddQuestionForm()">Pridať otázku</button>
        </div>
        
        <div class="add-question-form" id="addQuestionForm">
            <h3>Pridať novú otázku</h3>
            <form id="questionForm">
                <div class="form-group">
                    <label for="questionText">Otázka:</label>
                    <input type="text" id="questionText" required>
                </div>
                <div class="form-group">
                    <label>Možnosti (8):</label>
                    <div class="options-inputs">
                        <div class="option-input">
                            <input type="text" placeholder="Možnosť 1" required>
                            <input type="checkbox" class="correct-checkbox" title="Správna">
                        </div>
                        <div class="option-input">
                            <input type="text" placeholder="Možnosť 2" required>
                            <input type="checkbox" class="correct-checkbox" title="Správna">
                        </div>
                        <div class="option-input">
                            <input type="text" placeholder="Možnosť 3" required>
                            <input type="checkbox" class="correct-checkbox" title="Správna">
                        </div>
                        <div class="option-input">
                            <input type="text" placeholder="Možnosť 4" required>
                            <input type="checkbox" class="correct-checkbox" title="Správna">
                        </div>
                        <div class="option-input">
                            <input type="text" placeholder="Možnosť 5" required>
                            <input type="checkbox" class="correct-checkbox" title="Správna">
                        </div>
                        <div class="option-input">
                            <input type="text" placeholder="Možnosť 6" required>
                            <input type="checkbox" class="correct-checkbox" title="Správna">
                        </div>
                        <div class="option-input">
                            <input type="text" placeholder="Možnosť 7" required>
                            <input type="checkbox" class="correct-checkbox" title="Správna">
                        </div>
                        <div class="option-input">
                            <input type="text" placeholder="Možnosť 8" required>
                            <input type="checkbox" class="correct-checkbox" title="Správna">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="categorySelect">Kategória:</label>
                    <select id="categorySelect" required>
                        <option value="Termodynamika">Termodynamika</option>
                        <option value="Neviem čo">Neviem čo</option>
                    </select>
                </div>
                <button type="submit">Pridať otázku</button>
                <button type="button" onclick="hideAddQuestionForm()">Zrušiť</button>
            </form>
        </div>
        
        <div class="quiz-section" id="quizSection">
            <form id="quizForm">
                <!-- Otázky sa budú generovať tu -->
            </form>
            
            <div class="results" id="results">
                <h2>Výsledky</h2>
                <div class="score" id="score"></div>
                <button class="back-btn" onclick="backToCategories()">Späť na kategórie</button>
                <button class="restart-btn" onclick="location.reload()">Reštart</button>
            </div>
        </div>
    </div>

    <script>
        let allQuestions = [
            {
                question: "Ktoré sú základné zákony termodynamiky? (Vyber všetky správne)",
                options: ["Prvý zákon (zachovanie energie)", "Druhý zákon (entropia)", "Tretí zákon (nulová teplota)", "Štvrtý zákon (tepelné stroje)", "Zákon ideálnych plynov", "Zákon tepelného rozťaženia", "Zákon Carnota", "Zákon Clausiusa"],
                correct: [0, 1, 2],
                category: "Termodynamika"
            },
            {
                question: "Čo je to energia? (Vyber všetky správne)",
                options: ["Schopnosť vykonať prácu", "Merná jednotka tepla", "Forma hmoty", "Zákon zachovania", "Tepelná energia", "Mechanická energia", "Elektrická energia", "Chemická energia"],
                correct: [0, 3, 4, 5, 6, 7],
                category: "Neviem čo"
            }
        ];

        // Načítať otázky z localStorage
        const storedQuestions = localStorage.getItem('quizQuestions');
        if (storedQuestions) {
            allQuestions = JSON.parse(storedQuestions);
        }

        let currentQuestions = [];

        function selectCategory(category) {
            document.getElementById('categorySelection').style.display = 'none';
            document.getElementById('quizSection').style.display = 'block';
            currentQuestions = allQuestions.filter(q => q.category === category);
            initQuiz();
        }

        function backToCategories() {
            document.getElementById('quizSection').style.display = 'none';
            document.getElementById('results').style.display = 'none';
            document.getElementById('categorySelection').style.display = 'block';
            document.getElementById('quizForm').innerHTML = '';
            currentQuestions = [];
        }

        function showAddQuestionForm() {
            document.getElementById('addQuestionForm').style.display = 'block';
        }

        function hideAddQuestionForm() {
            document.getElementById('addQuestionForm').style.display = 'none';
            document.getElementById('questionForm').reset();
        }

        document.getElementById('questionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const questionText = document.getElementById('questionText').value;
            const category = document.getElementById('categorySelect').value;
            const optionInputs = document.querySelectorAll('.option-input input[type="text"]');
            const correctCheckboxes = document.querySelectorAll('.correct-checkbox');
            
            const options = [];
            const correct = [];
            optionInputs.forEach((input, index) => {
                options.push(input.value);
                if (correctCheckboxes[index].checked) {
                    correct.push(index);
                }
            });
            
            if (correct.length === 0) {
                alert('Vyber aspoň jednu správnu odpoveď!');
                return;
            }
            
            const newQuestion = {
                question: questionText,
                options: options,
                correct: correct,
                category: category
            };
            
            allQuestions.push(newQuestion);
            localStorage.setItem('quizQuestions', JSON.stringify(allQuestions));
            hideAddQuestionForm();
            alert('Otázka pridaná!');
        });

        function initQuiz() {
            const quizForm = document.getElementById('quizForm');
            quizForm.innerHTML = '';
            currentQuestions.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question';
                
                let optionsHTML = '<div class="options">';
                q.options.forEach((option, optIndex) => {
                    optionsHTML += `
                        <label>
                            <input type="checkbox" name="question${index}" value="${optIndex}">
                            ${option}
                        </label>
                    `;
                });
                optionsHTML += '</div>';
                optionsHTML += `<button type="button" class="confirm-btn" onclick="checkAnswer(${index})">Potvrdiť odpoveď</button>`;
                optionsHTML += `<div class="feedback" id="feedback${index}"></div>`;
                
                questionDiv.innerHTML = `<h2>${index + 1}. ${q.question}</h2>${optionsHTML}`;
                quizForm.appendChild(questionDiv);
            });
            
            const submitBtn = document.createElement('button');
            submitBtn.type = 'button';
            submitBtn.textContent = 'Odoslať odpovede';
            submitBtn.onclick = submitQuiz;
            quizForm.appendChild(submitBtn);
        }

        function checkAnswer(questionIndex) {
            const selected = Array.from(document.querySelectorAll(`input[name="question${questionIndex}"]:checked`)).map(cb => parseInt(cb.value));
            const correct = currentQuestions[questionIndex].correct;
            const feedback = document.getElementById(`feedback${questionIndex}`);
            const confirmBtn = document.querySelector(`.question:nth-child(${questionIndex + 1}) .confirm-btn`);
            
            // Zakázať všetky checkboxy a tlačidlo
            document.querySelectorAll(`input[name="question${questionIndex}"]`).forEach((input, idx) => {
                input.disabled = true;
                const label = input.parentElement;
                label.classList.add('disabled');
                
                if (correct.includes(idx)) {
                    label.classList.add('correct');
                } else if (selected.includes(idx)) {
                    label.classList.add('incorrect');
                }
            });
            confirmBtn.disabled = true;
            
            // Skontrolovať odpoveď
            const isCorrect = selected.length === correct.length && selected.every(val => correct.includes(val));
            
            // Zobraziť spätnu väzbu
            if (isCorrect) {
                feedback.className = 'feedback correct';
                feedback.textContent = '✓ Správne!';
            } else {
                feedback.className = 'feedback incorrect';
                const correctOptions = correct.map(idx => currentQuestions[questionIndex].options[idx]).join(', ');
                feedback.textContent = `✗ Chybne! Správne odpovede: ${correctOptions}`;
            }
        }

        function submitQuiz() {
            let correct = 0;
            currentQuestions.forEach((q, index) => {
                const selected = Array.from(document.querySelectorAll(`input[name="question${index}"]:checked`)).map(cb => parseInt(cb.value));
                const isCorrect = selected.length === q.correct.length && selected.every(val => q.correct.includes(val));
                if (isCorrect) {
                    correct++;
                }
            });
            
            const percentage = Math.round((correct / currentQuestions.length) * 100);
            document.getElementById('quizForm').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            document.getElementById('score').textContent = 
                `${correct} z ${currentQuestions.length} (${percentage}%)`;
        }
    </script>
</body>
</html>
